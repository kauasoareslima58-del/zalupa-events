<header class="navbar">
  <div class="logo">Zalupa Events</div>
  <nav>
    <a (click)="goToHome()">Início</a>
    <a (click)="goToEvets()">Eventos</a>
    <a (click)="goToAbout()">Sobre</a>
    <a (click)="goToContact()">Contato</a>
  </nav>
  <button class="btn-primary" (click)="exploreEvents()">Explorar</button>
</header>

<main class="hero-section">
  <div class="hero-content">
    <h1>Transforme seus momentos em <span class="highlight">Experiências Únicas</span></h1>
    <p>Planeje, gerencie e viva os melhores eventos com a Zalupa Events.</p>
    <div class="cta-buttons">
      <button class="btn-primary" (click)="exploreEvents()">Ver Eventos</button>
    </div>
  </div>
</main>

<section id="events" class="featured-events">
  <h2>Próximos Eventos</h2>
  <div class="event-grid">
    <div class="event-card" *ngFor="let event of events">
      <div class="card-image"></div>
      <div class="card-content">
        <h3>{{ event.title }}</h3>
        <p class="date">{{ event.date }}</p>
        <p>{{ event.description }}</p>
        <button class="btn-card" (click)="registerEvent(event.title)">Garantir Vaga</button>
      </div>
    </div>
  </div>
</section>
